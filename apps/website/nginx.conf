worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log off;
    error_log /dev/stderr error;

    add_header Content-Security-Policy "default-src 'self' https://*.7tv.app https://*.7tv.io; media-src 'self' https://*.7tv.app https://*.7tv.io data: blob:; connect-src 'self' https://*.7tv.app https://7tv.io https://*.7tv.io https://*.google-analytics.com https://checkout.stripe.com https://api.potat.app https://www.google.com; frame-src 'self' https://*.7tv.app https://*.7tv.io https://checkout.stripe.com https://www.google.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.7tv.app https://*.7tv.io www.googletagmanager.com/gtag/js https://checkout.stripe.com https://www.google.com https://www.gstatic.com blob:; img-src 'self' https://*.7tv.app https://*.7tv.io https://*.googletagmanager.com https://static-cdn.jtvnw.net https://cdn.discordapp.com https://kick.com https://files.kick.com https://*.stripe.com https://*.cloudfront.net data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; form-action 'self';";

    server {
        listen 80;

        root /var/www;
        index index.html;

        large_client_header_buffers 4 64k;
        client_header_buffer_size 64k;

        gzip_static on;

        location / {
            try_files $uri $uri/index.html $uri.html /spa.html;
        }

        location ~ "^/services/oembed/(?<filename>.+\.(?:json))$" {
            return 301 https://old.7tv.app/services/oembed/$filename;
        }

        location ~* \.(?:css|js|json|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
            try_files $uri =404;
        }

    }
}
